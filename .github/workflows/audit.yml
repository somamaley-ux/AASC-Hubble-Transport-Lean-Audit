name: audit

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lean-audit:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Lean
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          use-github-cache: false
      - name: Run audit
        shell: pwsh
        run: |
          $env:Path = "$env:USERPROFILE\.elan\bin;$env:Path"
          powershell -ExecutionPolicy Bypass -File scripts/check-hubble-transport-audit.ps1 -SkipLakeUpdate
